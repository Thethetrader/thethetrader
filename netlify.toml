[build]
  # Exclure la clé Stripe du build pour éviter la fuite dans le bundle (reste dispo pour les functions au runtime)
  command = "env -u STRIPE_SECRET_KEY npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_SECRET_KEY"

# Ne pas réécrire les fonctions Netlify vers index.html (évite 404 sur "Je m'abonne")
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"

# Vite hashes all asset filenames — safe to cache for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images and other static files
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 